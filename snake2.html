<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>משחק סנייק</title>
    <style>
        body{
            direction: rtl;
            font-size: 30px;
            background-color: yellow;
        }
        .greenText{
            background-color: lightgreen;
            width: 80%;
            margin-right: 10%;
            margin-top: 30px;
            padding: 10px;
            text-align: center;
        }
        td{
            height: 20px;
            width: 20px;
            border: 1px solid black;
            background-color: white;
        }
        table{margin: 0 auto; }
        #gameBoard{
            margin: 0 auto;
            width: 600px;
            display: grid;
            grid-template-columns: repeat(20,30px);
            grid-template-rows: repeat(20,30px);
            background-color: white;
        }
        #gameBoard div{
            border: 1px solid black;
        }
        .food{
            background-color: red ;
        }
        .snake{
            background-color: lightskyblue ;
        }
        .snakeHead{
            background-color: #129ff6;
        }
    </style>
</head>
<body>
    <h1 class="greenText">
        משחק סנייק
    </h1>
    <div class="greenText">
        נא ללחוץ כדי להתחיל את המשחק
        <br />
        <button>
            להתחלת משחק חדש
        </button>
    </div>
    <div id="gameBoard"></div>
    <script>
        const CellValues={
            EMPTY:0,
            FOOD:5,
            SNAKE:2,
            SNAKE_HEAD:4,
        }
        let numOfCols=20;
        let numOfRows=20;
        let board=[];
        function createBoard(){
            for(let i=0;i<numOfRows;i++){
                board[i]=[];
                for(let j=0;j<numOfCols;j++){
                    board[i].push(CellValues.EMPTY);
                }
            }
        }
        function AddFood(){
            let row,col;
            do {
                col = Math.floor(Math.random() * numOfCols);
                row = Math.floor(Math.random() * numOfRows);
            }while(board[row][col] !== CellValues.EMPTY);
            board[row][col]=CellValues.FOOD;
        }
        function showBoardWithInnerHTML(){
            let brd=document.getElementById("gameBoard");
            let str="";
            str += "<table>";
            for(let r=0;r<numOfRows;r++){
                str += "<tr>";
                for(let c=0;c<numOfCols;c++){
                    if (board[r][c]===CellValues.FOOD) {
                        str += "<td class='food'></td>";
                    } else {
                        str += "<td></td>";
                    }
                }
                str += "</tr>";
            }
            str += "</table>";
            brd.innerHTML=str;
        }
        function showBoard(){
            let brd=document.getElementById("gameBoard");
            
            let tbl=document.createElement("table");
            for(let r=0;r<numOfRows;r++){
                let tr=document.createElement("tr");
                for(let c=0;c<numOfCols;c++){
                    let td=document.createElement("td");
                    if (board[r][c]===CellValues.FOOD){
                        td.classList.add("food");
                    }
                    tr.appendChild(td);
                }
                tbl.appendChild(tr);
            }
            brd.appendChild(tbl);
        }
        function showBoardWithDiv(){
            let brd=document.getElementById("gameBoard");
            for(let r=0;r<numOfRows;r++){
                for(let c=0;c<numOfCols;c++){
                    let el=document.createElement("div");
                    switch (board[r][c]) {
                        case CellValues.SNAKE:      el.classList.add("snake");      break;
                        case CellValues.SNAKE_HEAD: el.classList.add("snakeHead");  break;
                        case CellValues.FOOD:       el.classList.add("food");       break;
                    }
                    brd.appendChild(el);
                }
            }
        }
        function InitSnake(){
            board[5][0]=CellValues.SNAKE;
            board[5][1]=CellValues.SNAKE;
            board[5][2]=CellValues.SNAKE_HEAD;
        }
        createBoard();
        InitSnake();
        AddFood();
        showBoardWithDiv();
    </script>
</body>
</html>
