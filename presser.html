<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .main_color{
            width: 400px;
            height: 400px;
            border: 1px solid black;
            border-radius: 10px;
            margin: 0 auto;
        }
        .btn{
            width: 70px;
            height: 70px;
            border: 1px solid black;
            border-radius: 50%;
            display: inline-block;
            margin: 10px;
        }
        .container{
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
<script>
    function setBig(color) {
        let screen = document.getElementById("bigScreen");
        screen.style.backgroundColor = color;
    }
    let el = document.createElement("div");
    el.classList.add("main_color");
    el.id = "bigScreen";
    document.body.appendChild(el);

    el = document.createElement("div");
    el.classList.add("container");
    el.id = "container";
    document.body.appendChild(el);

    let colors = ["red", "green", "blue", "yellow"];
    for (let clr of colors) {
        // create div
        let btn = document.createElement("div");
        // add class (btn) to div
        btn.classList.add("btn");
        // add style (background-color) to div
        btn.style.backgroundColor = clr;
        // add onclick event listener to div
        btn.addEventListener("click", function () {
            setBig(clr);
        });
        // append div to container
        document.getElementById("container").appendChild(btn);
        
    }
</script>
</body>
</html>
