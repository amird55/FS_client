<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        .main_color{
            width: 400px;
            height: 400px;
            border: 1px solid black;
            border-radius: 10px;
            margin: 0 auto;
        }
        .btn{
            width: 70px;
            height: 70px;
            border: 1px solid black;
            border-radius: 50%;
            display: inline-block;
            margin: 10px;
        }
        .container{
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="main_color" id="bigScreen"></div>
<div class="container">
    <div onclick="setBig('red')" class="btn" style="background-color: red;"></div>
    <div onclick="setBig('green')" class="btn" style="background-color: green;"></div>
    <div class="btn"></div>
    <div class="btn"></div>
</div>
<script>
    function setBig(color) {
        let screen = document.getElementById("bigScreen");
        screen.style.backgroundColor = color;
    }
</script>
</body>
</html>
